<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos - Pratini Manager</title>

<script src="https://cdn.jsdelivr.net/npm/@db/db-js@2"></script>
<script src="supabase.js"></script>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#111;color:white}
header{background:#ffc400;color:#000;padding:20px;text-align:center;font-size:28px;font-weight:bold}
.container{padding:20px;max-width:900px;margin:auto}
.card{background:#1f1f1f;padding:20px;border-radius:15px;margin-bottom:15px}
input,button{width:100%;padding:14px;margin:8px 0;border:none;border-radius:8px;font-size:16px;box-sizing:border-box}
button{background:#ffc400;font-weight:bold;cursor:pointer}
.evento{border-left:6px solid #ffc400}
.voltar{background:#333;color:white}
</style>
</head>

<body>

<header>EVENTOS</header>

<div class="container">

<div class="card">
<h2>Novo Evento</h2>
<input id="nomeEvento" placeholder="Nome do evento">
<input id="cidadeEvento" placeholder="Cidade">
<input id="dataEvento" type="date">
<button onclick="adicionarEvento()">Salvar Evento</button>
</div>

<div id="listaEventos">Carregando eventos...</div>

<button class="voltar" onclick="location.href='dashboard.html'">Voltar ao Painel</button>

</div>

<script>
async function carregarEventos(){
const lista = document.getElementById("listaEventos");
lista.innerHTML = "Carregando eventos...";

const { data, error } = await db
.from("eventos_v2")
.select("*")
.order("created_at", { ascending:false });

if(error){
lista.innerHTML = "<p>Erro ao carregar eventos.</p>";
console.error(error);
return;
}

if(!data || data.length === 0){
lista.innerHTML = "<p>Nenhum evento cadastrado ainda.</p>";
return;
}

lista.innerHTML = "";

data.forEach(evento => {
lista.innerHTML += `
<div class="card evento">
<h2>${evento.nome}</h2>
<p><b>Cidade:</b> ${evento.cidade || "Não informada"}</p>
<p><b>Data:</b> ${evento.data_evento || "Não informada"}</p>
<p><b>Status:</b> ${evento.status}</p>
<button onclick="selecionarEvento('${evento.id}', '${evento.nome}')">Definir como Evento Ativo</button>
</div>
`;
});
}

async function adicionarEvento(){
const nome = document.getElementById("nomeEvento").value.trim();
const cidade = document.getElementById("cidadeEvento").value.trim();
const data_evento = document.getElementById("dataEvento").value;

if(!nome){
alert("Digite o nome do evento.");
return;
}

const { error } = await supabase
.from("eventos_v2")
.insert([{ nome, cidade, data_evento }]);

if(error){
alert("Erro ao salvar evento.");
console.error(error);
return;
}

document.getElementById("nomeEvento").value = "";
document.getElementById("cidadeEvento").value = "";
document.getElementById("dataEvento").value = "";

alert("Evento salvo com sucesso!");
carregarEventos();
}

function selecionarEvento(id, nome){
localStorage.setItem("evento_ativo_id", id);
localStorage.setItem("evento_ativo_nome", nome);
alert("Evento ativo definido: " + nome);
location.href = "dashboard.html";
}

carregarEventos();
</script>

</body>
</html>
