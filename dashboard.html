<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel - Pratini Manager</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#ffc400;
color:#000;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1f1f1f;
padding:25px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
background:#2a2a2a;
transform:scale(1.03);
}

.icone{
font-size:60px;
margin-bottom:15px;
}

h2{
margin:10px 0;
}

p{
color:#bbb;
}

</style>

</head>

<body>

<header>

PRATINI MANAGER

</header>

<div class="container">

<div class="card">

<div class="icone">🏃</div>

<h2>Eventos</h2>

<p>Cadastrar e gerenciar eventos.</p>

</div>

<div class="card">

<div class="icone">👥</div>

<h2>Atletas</h2>

<p>Lista completa dos inscritos.</p>

</div>

<div class="card">

<div class="icone">🎽</div>

<h2>Entrega de Kits</h2>

<p>Pesquisar e entregar kits.</p>

</div>

<div class="card">

<div class="icone">📷</div>

<h2>QR Code</h2>

<p>Leitor pelo celular.</p>

</div>

<div class="card">

<div class="icone">📊</div>

<h2>Relatórios</h2>

<p>Acompanhe tudo em tempo real.</p>

</div>

<div class="card">

<div class="icone">⚙️</div>

<h2>Configurações</h2>

<p>Configurações do sistema.</p>

</div>

</div>

</body>
</html>
