<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratini Manager V2</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:#fff;
}

header{
    background:#FFC400;
    color:#000;
    text-align:center;
    padding:35px 20px;
}

header h1{
    font-size:40px;
}

header p{
    margin-top:10px;
    font-size:18px;
}

.container{
    max-width:500px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:#1d1d1d;
    padding:30px;
    border-radius:15px;
}

button{
    width:100%;
    padding:18px;
    margin:15px 0;
    border:none;
    border-radius:10px;
    background:#FFC400;
    color:#000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ffdb4d;
}

footer{
    text-align:center;
    margin-top:30px;
    color:#999;
}

</style>

</head>

<body>

<header>

<h1>PRATINI MANAGER V2</h1>

<p>Sistema Profissional de Gestão de Eventos</p>

</header>

<div class="container">

<div class="card">

<button>🔐 Entrar no Sistema</button>

<button>🏃 Eventos</button>

<button>🎽 Entrega de Kits</button>

</div>

<footer>

Versão 2.0 • Pratini Sports

</footer>

</div>

</body>

</html>
