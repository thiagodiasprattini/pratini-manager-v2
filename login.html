<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Pratini Manager</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://kchpprimvfnwchztwlsa.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_TT9qEWZX65Xl3prYCwqMtw_t7kA7lf4";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>

<style>
body{margin:0;background:#111;font-family:Arial,Helvetica,sans-serif;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#1f1f1f;padding:30px;border-radius:15px;width:320px;text-align:center}
h1{color:#ffc400;margin-bottom:25px}
input{width:100%;padding:14px;margin:10px 0;border:none;border-radius:8px;font-size:16px;box-sizing:border-box}
button{width:100%;padding:15px;background:#ffc400;border:none;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer}
button:hover{background:#ffb300}
.erro{color:#ff4d4d;margin-top:15px}
</style>
</head>

<body>

<div class="card">
<h1>PRATINI MANAGER</h1>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

<p id="mensagem" class="erro"></p>
</div>

<script>
async function entrar(){
const usuario = document.getElementById("usuario").value.trim();
const senha = document.getElementById("senha").value.trim();
const mensagem = document.getElementById("mensagem");

mensagem.innerHTML = "";

if(!usuario || !senha){
mensagem.innerHTML = "Digite usuário e senha.";
return;
}

const { data, error } = await db
.from("usuarios_v2")
.select("*")
.eq("usuario", usuario)
.eq("senha", senha)
.eq("ativo", true)
.limit(1);

if(error){
mensagem.innerHTML = "Erro ao acessar: " + error.message;
return;
}

if(!data || data.length === 0){
mensagem.innerHTML = "Usuário ou senha inválidos.";
return;
}

const user = data[0];

localStorage.setItem("usuario_nome", user.nome);
localStorage.setItem("usuario_login", user.usuario);
localStorage.setItem("usuario_perfil", user.perfil);

location.href = "dashboard.html";
}
</script>

</body>
</html>
