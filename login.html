<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Pratini Manager</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial,Helvetica,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1f1f1f;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}

h1{
color:#ffc400;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#ffc400;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffb300;
}
</style>

</head>

<body>

<div class="card">

<h1>PRATINI MANAGER</h1>

<input type="email" placeholder="E-mail">

<input type="password" placeholder="Senha">

<button onclick="location.href='dashboard.html'">Entrar</button>

</div>

</body>
</html>
